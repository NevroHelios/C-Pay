name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Mobile app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Expo dependency compatibility
        run: npx expo install --check

      - name: Type check
        run: npx tsc --noEmit

  relayer:
    name: Relayer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relayer-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: relayer-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Check test script syntax
        run: node --check test-relayer.js

      - name: Run tests
        run: npm test -- --passWithNoTests --runInBand

  blockchain:
    name: Blockchain and contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Blockchain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Blockchain/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Blockchain/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Blockchain/Cargo.lock', 'Blockchain/contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Run Stellar rail tests
        run: npm test -- --runInBand

      - name: Check contract formatting
        run: cargo fmt --manifest-path contracts/cpay_payments/Cargo.toml -- --check

      - name: Run contract tests
        run: cargo test --manifest-path contracts/cpay_payments/Cargo.toml
